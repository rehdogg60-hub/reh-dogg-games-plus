<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Hoop & Pin Strike | Reh Dogg Games Plus</title>

<style>
* {
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  min-height: 100vh;
  padding: 18px;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #16494b, #041014 70%);
  font-family: "Segoe UI", Arial, sans-serif;
  color: #fff3d2;
}

.game-wrapper {
  width: min(960px, 100%);
  background: rgba(5, 20, 24, 0.92);
  border: 2px solid rgba(255, 196, 91, 0.55);
  border-radius: 32px;
  padding: 18px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.65);
}

.brand {
  text-align: center;
  margin-bottom: 12px;
}

.brand h1 {
  margin: 0;
  font-size: clamp(1.6rem, 4vw, 2.7rem);
  color: #ffc15a;
  text-shadow: 0 3px 0 #3d1d00;
}

.brand p {
  margin: 5px 0 0;
  color: #b9e7ff;
  font-size: 0.9rem;
}

canvas {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 28px;
  background: #264936;
  box-shadow: inset 0 0 40px rgba(0,0,0,0.45), 0 12px 28px rgba(0,0,0,0.55);
  cursor: grab;
  touch-action: none;
}

canvas:active {
  cursor: grabbing;
}

.stats-panel {
  margin-top: 14px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

.stat {
  background: #07191f;
  border: 1px solid rgba(255,196,91,0.4);
  border-radius: 18px;
  padding: 8px;
  text-align: center;
  font-weight: 800;
  font-size: 0.78rem;
}

.stat span {
  display: block;
  margin-top: 4px;
  font-size: 1.4rem;
  color: #ffbd63;
}

.message-area {
  margin-top: 12px;
  min-height: 34px;
  padding: 9px 14px;
  border-radius: 18px;
  background: rgba(0,0,0,0.45);
  text-align: center;
  color: #dff5ff;
  font-weight: 700;
}

.controls {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

button {
  border: 0;
  border-radius: 999px;
  padding: 10px 20px;
  background: #314346;
  color: #fff1ca;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 4px 0 #101719;
}

button:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #101719;
}

.primary {
  background: #b96f2c;
}

.help {
  margin-top: 10px;
  text-align: center;
  font-size: 0.78rem;
  color: #b8d6df;
}


/* INTRO SCREEN */
#introScreen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: #000;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

#introVideo {
  width: min(100%, 900px);
  max-height: 70vh;
  object-fit: contain;
  border-radius: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.75);
}


.introButtons {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

#playIntroBtn,
#skipIntroBtn {
  margin-top: 20px;
  padding: 14px 30px;
  font-size: 18px;
  background: #ffc15a;
  color: #231100;
  border: none;
  border-radius: 999px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 5px 0 #704000;
}

#playIntroBtn:active,
#skipIntroBtn:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #704000;
}

@media (max-width: 720px) {
  .stats-panel {
    grid-template-columns: repeat(2, 1fr);
  }

  .stat:last-child {
    grid-column: span 2;
  }
}
</style>
</head>

<body>
<!-- INTRO SCREEN -->
<div id="introScreen">
  <video id="introVideo" playsinline preload="auto">
    <source src="intro.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <div class="introButtons">
    <button id="playIntroBtn">▶ PLAY INTRO WITH SOUND</button>
    <button id="skipIntroBtn">⏭ SKIP INTRO</button>
  </div>
</div>

<div class="game-wrapper">
  <div class="brand">
    <h1>🏀 Hoop & Pin Strike 🎳</h1>
    <p>Reh Dogg Games Plus | Basketball Aim + Bowling Collision</p>
  </div>

  <canvas id="gameCanvas" width="900" height="500"></canvas>

  <div class="stats-panel">
    <div class="stat">Score <span id="scoreValue">0</span></div>
    <div class="stat">High <span id="highScoreValue">0</span></div>
    <div class="stat">Frame <span id="frameValue">1</span></div>
    <div class="stat">Shot <span id="shotValue">1/2</span></div>
    <div class="stat">Pins <span id="pinsValue">10</span></div>
  </div>

  <div class="message-area" id="gameMessage">
    Drag from the ball, aim through the hoop, and release.
  </div>

  <div class="controls">
    <button class="primary" id="newGameBtn">New Game</button>
    <button id="pauseBtn">Pause</button>
    <button id="soundBtn">Sound On</button>
    <button id="nextFrameBtn">Next Frame</button>
  </div>

  <div class="help">
    Hoop bonus: +15 points and doubled pin value for that shot. Strike bonus: +20. Spare bonus: +10.
  </div>
</div>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");

  const W = canvas.width;
  const H = canvas.height;

  const ui = {
    score: document.getElementById("scoreValue"),
    high: document.getElementById("highScoreValue"),
    frame: document.getElementById("frameValue"),
    shot: document.getElementById("shotValue"),
    pins: document.getElementById("pinsValue"),
    message: document.getElementById("gameMessage"),
    newGame: document.getElementById("newGameBtn"),
    pause: document.getElementById("pauseBtn"),
    sound: document.getElementById("soundBtn"),
    nextFrame: document.getElementById("nextFrameBtn")
  };

  const STORAGE_KEY = "rehDoggHoopPinStrikeHighScore";
  const SOUND_KEY = "rehDoggHoopPinStrikeSoundEnabled";
  const sounds = {
    launch: new Audio("sounds/launch.mp3"),
    swish: new Audio("sounds/swish.mp3"),
    pinHit: new Audio("sounds/pin-hit.mp3"),
    strike: new Audio("sounds/strike.mp3"),
    spare: new Audio("sounds/spare.mp3"),
    gameOver: new Audio("sounds/game-over.mp3"),
    click: new Audio("sounds/click.mp3")
  };

  const state = {
    score: 0,
    highScore: Number(localStorage.getItem(STORAGE_KEY) || 0),
    frame: 1,
    shot: 1,
    maxFrames: 10,
    paused: false,
    gameOver: false,
    animId: null,
    hoopBonus: false,
    dragging: false,
    shake: 0,
    shotResolving: false,
    soundEnabled: localStorage.getItem(SOUND_KEY) !== "off",
    audioUnlocked: false
  };

  const ball = {
    x: W / 2,
    y: H - 58,
    r: 12,
    vx: 0,
    vy: 0,
    moving: false,
    trail: []
  };

  const aim = {
    active: false,
    dx: 0,
    dy: 0
  };

  const hoop = {
    x: W / 2,
    y: 122,
    w: 86,
    h: 24,
    dir: 1,
    speed: 2.35
  };

  const pinTemplate = [
    [0, -45, 10],
    [-26, -15, 20], [26, -15, 20],
    [-52, 15, 30], [0, 15, 30], [52, 15, 30],
    [-78, 47, 40], [-26, 47, 40], [26, 47, 40], [78, 47, 40]
  ];

  let pins = [];
  let bursts = [];
  let textEffects = [];

  Object.values(sounds).forEach(sound => {
    sound.preload = "auto";
    sound.volume = 0.78;
  });

  function updateSoundButton() {
    ui.sound.textContent = state.soundEnabled ? "Sound On" : "Sound Off";
  }

  function unlockAudio(playClick = false) {
    state.audioUnlocked = true;
    Object.values(sounds).forEach(sound => sound.load());
    if (playClick) playSound("click");
  }

  function playSound(name) {
    if (!state.soundEnabled || !state.audioUnlocked || !sounds[name]) return;
    const sound = sounds[name].cloneNode();
    sound.volume = sounds[name].volume;
    sound.play().catch(() => {});
  }

  function toggleSound() {
    unlockAudio(false);
    const wasEnabled = state.soundEnabled;
    if (wasEnabled) playSound("click");
    state.soundEnabled = !state.soundEnabled;
    localStorage.setItem(SOUND_KEY, state.soundEnabled ? "on" : "off");
    updateSoundButton();
    if (!wasEnabled && state.soundEnabled) playSound("click");
  }

  window.hoopPinAudio = {
    unlock: unlockAudio,
    play: playSound
  };

  function makePins() {
    pins = pinTemplate.map((p, i) => ({
      id: i,
      x: W / 2 + p[0],
      y: 270 + p[1],
      r: 11,
      points: p[2],
      standing: true,
      fallX: 0,
      fallY: 0,
      rot: 0,
      spin: 0
    }));
  }

  function pinsLeft() {
    return pins.filter(p => p.standing).length;
  }

  function updateUI() {
    ui.score.textContent = state.score;
    ui.high.textContent = state.highScore;
    ui.frame.textContent = state.frame;
    ui.shot.textContent = `${state.shot}/2`;
    ui.pins.textContent = pinsLeft();
    ui.pause.textContent = state.paused ? "Resume" : "Pause";
  }

  function setMessage(text) {
    ui.message.textContent = text;
  }

  function saveHighScore() {
    if (state.score > state.highScore) {
      state.highScore = state.score;
      localStorage.setItem(STORAGE_KEY, String(state.highScore));
    }
  }

  function resetBall() {
    ball.x = W / 2;
    ball.y = H - 58;
    ball.vx = 0;
    ball.vy = 0;
    ball.moving = false;
    ball.trail = [];
    aim.active = false;
    aim.dx = 0;
    aim.dy = 0;
    state.dragging = false;
    state.hoopBonus = false;
    state.shotResolving = false;
  }

  function newGame(fromUser = false) {
    if (fromUser) unlockAudio(true);
    cancelLoop();

    state.score = 0;
    state.frame = 1;
    state.shot = 1;
    state.paused = false;
    state.gameOver = false;
    state.hoopBonus = false;
    state.shake = 0;
    state.shotResolving = false;
    bursts = [];
    textEffects = [];

    hoop.x = W / 2;
    hoop.dir = 1;

    makePins();
    resetBall();
    updateUI();
    setMessage("New game. Drag from the ball and release.");
    draw();
  }

  function cancelLoop() {
    if (state.animId) {
      cancelAnimationFrame(state.animId);
      state.animId = null;
    }
  }

  function startLoop() {
    cancelLoop();
    state.animId = requestAnimationFrame(loop);
  }

  function getPointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    const point = e.touches ? e.touches[0] : e;

    return {
      x: (point.clientX - rect.left) * (canvas.width / rect.width),
      y: (point.clientY - rect.top) * (canvas.height / rect.height)
    };
  }

  function pointerDown(e) {
    e.preventDefault();

    if (state.paused || state.gameOver || ball.moving) return;

    const pos = getPointerPos(e);
    const dist = Math.hypot(pos.x - ball.x, pos.y - ball.y);

    if (dist <= ball.r + 24) {
      state.dragging = true;
      aim.active = true;
      aim.dx = 0;
      aim.dy = 0;
      draw();
    }
  }

  function pointerMove(e) {
    if (!state.dragging || !aim.active || ball.moving) return;
    e.preventDefault();

    const pos = getPointerPos(e);

    let dx = pos.x - ball.x;
    let dy = pos.y - ball.y;

    const maxPull = 125;
    const mag = Math.hypot(dx, dy);

    if (mag > maxPull) {
      dx = dx / mag * maxPull;
      dy = dy / mag * maxPull;
    }

    aim.dx = dx;
    aim.dy = dy;

    draw();
  }

  function pointerUp(e) {
    if (!state.dragging || !aim.active || ball.moving) {
      state.dragging = false;
      aim.active = false;
      draw();
      return;
    }

    e.preventDefault();

    state.dragging = false;

    const powerScale = 0.28;

    ball.vx = -aim.dx * powerScale;
    ball.vy = -aim.dy * powerScale - 2.4;

    if (Math.hypot(ball.vx, ball.vy) < 2) {
      setMessage("Pull farther for more power.");
      aim.active = false;
      draw();
      return;
    }

    ball.moving = true;
    ball.trail = [];
    aim.active = false;
    state.hoopBonus = false;

    setMessage("Shot launched! Arc it through the hoop gate.");
    playSound("launch");
    startLoop();
  }

  function updateHoop() {
    hoop.x += hoop.speed * hoop.dir;

    if (hoop.x < 145) hoop.dir = 1;
    if (hoop.x > W - 145) hoop.dir = -1;
  }

  function checkHoopBonus() {
    if (state.hoopBonus) return;

    const left = hoop.x - hoop.w / 2;
    const right = hoop.x + hoop.w / 2;
    const top = hoop.y - hoop.h / 2;
    const bottom = hoop.y + hoop.h / 2;

    const touching =
      ball.x + ball.r > left &&
      ball.x - ball.r < right &&
      ball.y + ball.r > top &&
      ball.y - ball.r < bottom;

    if (touching) {
      state.hoopBonus = true;
      state.score += 15;
      state.shake = Math.max(state.shake, 6);
      addBurst(ball.x, ball.y, "#fff58d", 22);
      addTextEffect("SWISH!", hoop.x, hoop.y - 46, "#fff58d");
      playSound("swish");
      saveHighScore();
      updateUI();
      setMessage("HOOP BONUS! +15 and pin points doubled this shot.");
    }
  }

  function hitPins() {
    for (const pin of pins) {
      if (!pin.standing) continue;

      const d = Math.hypot(ball.x - pin.x, ball.y - pin.y);

      if (d < ball.r + pin.r) {
        pin.standing = false;

        const earned = state.hoopBonus ? pin.points * 2 : pin.points;
        state.score += earned;

        const angle = Math.atan2(ball.y - pin.y, ball.x - pin.x);
        pin.fallX = -Math.cos(angle) * 18 + ball.vx * 0.45;
        pin.fallY = -Math.sin(angle) * 18 + ball.vy * 0.35;
        pin.spin = (Math.random() > 0.5 ? 1 : -1) * (0.8 + Math.random() * 0.9);
        pin.rot = pin.spin;

        ball.vx += Math.cos(angle) * 1.2;
        ball.vy += Math.sin(angle) * 1.1;

        ball.vx *= 0.88;
        ball.vy *= 0.88;

        state.shake = Math.max(state.shake, 3);
        addBurst(pin.x, pin.y, state.hoopBonus ? "#fff58d" : "#ffbd63", 14);
        playSound("pinHit");

        saveHighScore();
        updateUI();
      }
    }
  }

  function updateBall() {
    ball.vx *= 0.992;
    ball.vy *= 0.992;
    ball.vy += 0.17;

    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.trail.push({ x: ball.x, y: ball.y, r: ball.r });
    if (ball.trail.length > 14) ball.trail.shift();

    if (ball.x - ball.r < 35) {
      ball.x = 35 + ball.r;
      ball.vx *= -0.72;
    }

    if (ball.x + ball.r > W - 35) {
      ball.x = W - 35 - ball.r;
      ball.vx *= -0.72;
    }

    if (ball.y - ball.r < 28) {
      ball.y = 28 + ball.r;
      ball.vy *= -0.55;
    }

    if (ball.y + ball.r > H - 28) {
      ball.y = H - 28 - ball.r;
      ball.vy *= -0.38;
      ball.vx *= 0.94;
    }

    checkHoopBonus();
    hitPins();

    const slow = Math.hypot(ball.vx, ball.vy) < 0.6;
    const nearBottom = ball.y + ball.r >= H - 34;
    const pastPins = ball.y > 300 && ball.vy > 0.2;

    if ((slow && nearBottom) || (pastPins && pinsLeft() === 0)) {
      ball.moving = false;
      endShot();
    }
  }

  function endShot() {
    const remaining = pinsLeft();
    const strike = state.shot === 1 && remaining === 0;
    const spare = state.shot === 2 && remaining === 0;

    if (strike) {
      state.score += 20;
      saveHighScore();
      setMessage("STRIKE! +20 bonus.");
      addTextEffect("STRIKE!", W / 2, H / 2 - 32, "#ffbd63", 56);
      state.shake = 18;
      playSound("strike");
      finishShotCinematic();
      return;
    }

    if (spare) {
      state.score += 10;
      saveHighScore();
      setMessage("SPARE! +10 bonus.");
      addTextEffect("SPARE!", W / 2, H / 2 - 32, "#fff58d", 50);
      state.shake = 12;
      playSound("spare");
      finishShotCinematic();
      return;
    }

    if (state.shot === 1) {
      state.shot = 2;
      resetBall();
      updateUI();
      setMessage(`${remaining} pins left. Take your second shot.`);
      draw();
      return;
    }

    setMessage(`Frame finished. ${remaining} pins left.`);
    finishShotCinematic();
  }

  function finishShotCinematic() {
    if (state.shotResolving) return;
    state.shotResolving = true;
    startLoop();
    window.setTimeout(() => nextFrame(true), 700);
  }

  function nextFrame(fromShot = false) {
    if (!fromShot && ball.moving) {
      setMessage("Wait for the current shot to finish.");
      return;
    }

    if (state.frame >= state.maxFrames) {
      gameOver();
      return;
    }

    state.frame += 1;
    state.shot = 1;

    makePins();
    resetBall();
    updateUI();

    if (!state.gameOver) {
      setMessage(`Frame ${state.frame}. Drag from the ball to shoot.`);
    }

    draw();
  }

  function gameOver() {
    state.gameOver = true;
    ball.moving = false;
    cancelLoop();
    saveHighScore();
    updateUI();
    setMessage(`Game complete! Final Score: ${state.score}.`);
    playSound("gameOver");
    draw();
  }

  function togglePause() {
    if (state.gameOver) return;

    state.paused = !state.paused;
    updateUI();

    if (state.paused) {
      cancelLoop();
      setMessage("Paused.");
      draw();
    } else {
      setMessage("Resumed.");
      if (ball.moving) startLoop();
      else draw();
    }
  }

  function loop() {
    if (state.paused || state.gameOver) {
      cancelLoop();
      return;
    }

    updateHoop();

    if (ball.moving) {
      updateBall();
    }

    draw();

    decayEffects();

    if (ball.moving || bursts.length || textEffects.length || state.shake > 0 || state.shotResolving) {
      state.animId = requestAnimationFrame(loop);
    } else {
      cancelLoop();
    }
  }

  function addBurst(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.8 + Math.random() * 5.2;
      bursts.push({
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 28 + Math.random() * 18,
        maxLife: 46,
        color,
        size: 2 + Math.random() * 4
      });
    }
  }

  function addTextEffect(text, x, y, color, size = 38) {
    textEffects.push({ text, x, y, color, size, life: 55, maxLife: 55 });
  }

  function decayEffects() {
    bursts.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.94;
      p.vy *= 0.94;
      p.vy += 0.06;
      p.life -= 1;
    });
    bursts = bursts.filter(p => p.life > 0);

    textEffects.forEach(t => {
      t.y -= 0.7;
      t.life -= 1;
    });
    textEffects = textEffects.filter(t => t.life > 0);

    for (const pin of pins) {
      if (!pin.standing) {
        pin.fallX *= 0.94;
        pin.fallY *= 0.94;
        pin.fallY += 0.28;
        pin.rot += pin.spin * 0.08;
        pin.spin *= 0.95;
      }
    }

    state.shake *= 0.86;
    if (state.shake < 0.2) state.shake = 0;
  }

  function drawCourt() {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, "#4f805f");
    grad.addColorStop(1, "#1d3d2d");

    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = "rgba(255,255,255,0.16)";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.moveTo(35, 28);
    ctx.lineTo(35, H - 28);
    ctx.moveTo(W - 35, 28);
    ctx.lineTo(W - 35, H - 28);
    ctx.stroke();

    ctx.fillStyle = "rgba(255,218,137,0.45)";
    for (let i = 0; i < 12; i++) {
      ctx.beginPath();
      ctx.arc(70 + i * 70, H - 45, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = "rgba(0,0,0,0.22)";
    ctx.fillRect(35, 235, W - 70, 5);

    ctx.strokeStyle = "rgba(255,245,141,0.2)";
    ctx.setLineDash([12, 10]);
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(W / 2, H - 60);
    ctx.quadraticCurveTo(hoop.x, 80, W / 2, 270);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawHoop() {
    ctx.save();
    ctx.shadowBlur = state.hoopBonus ? 28 : 14;
    ctx.shadowColor = state.hoopBonus ? "#fff58d" : "#ffbd44";

    ctx.fillStyle = "rgba(0,0,0,0.38)";
    ctx.fillRect(hoop.x - 8, hoop.y - 78, 16, 76);
    ctx.fillStyle = "rgba(255,255,255,0.72)";
    ctx.fillRect(hoop.x - 62, hoop.y - 84, 124, 54);
    ctx.strokeStyle = "#26333b";
    ctx.lineWidth = 5;
    ctx.strokeRect(hoop.x - 62, hoop.y - 84, 124, 54);

    ctx.beginPath();
    ctx.ellipse(hoop.x, hoop.y, hoop.w / 2, hoop.h / 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,132,36,0.4)";
    ctx.fill();

    ctx.strokeStyle = "#ffc45f";
    ctx.lineWidth = 5;
    ctx.stroke();

    ctx.fillStyle = "#fff0b9";
    ctx.fillRect(hoop.x - 36, hoop.y - 4, 72, 8);

    ctx.strokeStyle = "rgba(255,255,255,0.42)";
    ctx.lineWidth = 2;
    for (let i = -28; i <= 28; i += 14) {
      ctx.beginPath();
      ctx.moveTo(hoop.x + i, hoop.y + 8);
      ctx.lineTo(hoop.x + i * 0.45, hoop.y + 46);
      ctx.stroke();
    }

    ctx.restore();

    ctx.font = "bold 18px monospace";
    ctx.fillStyle = "#fff5cd";
    ctx.fillText("+15", hoop.x - 16, hoop.y - 20);
  }

  function drawPins() {
    ctx.font = "bold 10px Arial";
    ctx.textAlign = "center";

    for (const pin of pins) {
      if (pin.standing) {
        ctx.fillStyle = "#fff7e5";
        ctx.beginPath();
        ctx.ellipse(pin.x, pin.y, pin.r, pin.r * 1.45, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#c73f2f";
        ctx.fillRect(pin.x - 7, pin.y - 5, 14, 4);

        ctx.fillStyle = "#3a1d10";
        ctx.fillText(pin.points, pin.x, pin.y - 13);
      } else {
        ctx.save();
        ctx.translate(pin.x + pin.fallX, pin.y + pin.fallY);
        ctx.rotate(pin.rot);
        ctx.fillStyle = "rgba(255,230,180,0.25)";
        ctx.beginPath();
        ctx.ellipse(0, 0, pin.r * 1.55, pin.r * 0.52, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(255,247,229,0.72)";
        ctx.fillRect(-pin.r, -4, pin.r * 2.1, 8);
        ctx.restore();
      }
    }

    ctx.textAlign = "left";
  }

  function drawBall() {
    ctx.save();
    for (let i = 0; i < ball.trail.length; i++) {
      const t = ball.trail[i];
      const alpha = (i + 1) / ball.trail.length * 0.32;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r * (0.55 + i / ball.trail.length * 0.5), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,189,99,${alpha})`;
      ctx.fill();
    }

    ctx.shadowBlur = 10;
    ctx.shadowColor = "rgba(0,0,0,0.6)";

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fillStyle = "#e57b2d";
    ctx.fill();

    ctx.strokeStyle = "#3b1b0a";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r * 0.72, -1.4, 1.4);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(ball.x - ball.r, ball.y);
    ctx.lineTo(ball.x + ball.r, ball.y);
    ctx.stroke();

    ctx.restore();
  }

  function drawAim() {
    if (!aim.active || ball.moving) return;

    ctx.save();

    const endX = ball.x + aim.dx;
    const endY = ball.y + aim.dy;

    ctx.strokeStyle = "#fff58d";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(ball.x, ball.y);
    ctx.lineTo(endX, endY);
    ctx.stroke();

    ctx.strokeStyle = "rgba(255,245,141,0.58)";
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 8]);
    ctx.beginPath();
    ctx.moveTo(ball.x, ball.y);
    ctx.quadraticCurveTo(ball.x - aim.dx * 1.2, ball.y - Math.abs(aim.dy) * 2.4 - 120, hoop.x, hoop.y);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 14px Arial";
    ctx.fillText("Pull back, release to launch", endX + 10, endY - 10);

    ctx.restore();
  }

  function drawOverlay() {
    if (!state.paused && !state.gameOver) return;

    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = "#ffe2a1";
    ctx.textAlign = "center";
    ctx.font = "bold 42px Arial";
    ctx.fillText(state.gameOver ? "GAME OVER" : "PAUSED", W / 2, H / 2);

    ctx.textAlign = "left";
    ctx.restore();
  }

  function drawBursts() {
    for (const p of bursts) {
      const alpha = Math.max(0, p.life / p.maxLife);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawTextEffects() {
    ctx.save();
    ctx.textAlign = "center";
    ctx.lineJoin = "round";
    for (const effect of textEffects) {
      const alpha = Math.max(0, effect.life / effect.maxLife);
      const scale = 1 + (1 - alpha) * 0.18;
      ctx.globalAlpha = alpha;
      ctx.font = `900 ${effect.size * scale}px Arial`;
      ctx.strokeStyle = "#1b0900";
      ctx.lineWidth = 9;
      ctx.strokeText(effect.text, effect.x, effect.y);
      ctx.fillStyle = effect.color;
      ctx.fillText(effect.text, effect.x, effect.y);
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (state.shake > 0) {
      ctx.translate((Math.random() - 0.5) * state.shake, (Math.random() - 0.5) * state.shake);
    }
    drawCourt();
    drawHoop();
    drawPins();
    drawBall();
    drawAim();
    drawBursts();
    drawTextEffects();
    drawOverlay();
    ctx.restore();
  }

  canvas.addEventListener("mousedown", pointerDown);
  window.addEventListener("mousemove", pointerMove);
  window.addEventListener("mouseup", pointerUp);

  canvas.addEventListener("touchstart", pointerDown, { passive: false });
  window.addEventListener("touchmove", pointerMove, { passive: false });
  window.addEventListener("touchend", pointerUp, { passive: false });

  ui.newGame.addEventListener("click", () => newGame(true));
  ui.pause.addEventListener("click", () => {
    unlockAudio(true);
    togglePause();
  });
  ui.sound.addEventListener("click", toggleSound);
  ui.nextFrame.addEventListener("click", () => {
    unlockAudio(true);
    nextFrame(false);
  });

  updateSoundButton();
  newGame(false);
})();
</script>
<script>
const introScreen = document.getElementById("introScreen");
const introVideo = document.getElementById("introVideo");
const playIntroBtn = document.getElementById("playIntroBtn");
const skipIntroBtn = document.getElementById("skipIntroBtn");

function closeIntroScreen() {
  if (introVideo) introVideo.pause();
  if (introScreen) introScreen.style.display = "none";
}

if (playIntroBtn && introVideo) {
  playIntroBtn.addEventListener("click", async () => {
    if (window.hoopPinAudio) {
      window.hoopPinAudio.unlock(true);
    }
    try {
      introVideo.muted = false;
      introVideo.currentTime = 0;
      await introVideo.play();
      playIntroBtn.style.display = "none";
    } catch (error) {
      console.warn("Intro video could not play with sound:", error);
      closeIntroScreen();
    }
  });
}

if (introVideo) {
  introVideo.addEventListener("ended", closeIntroScreen);
}

if (skipIntroBtn) {
  skipIntroBtn.addEventListener("click", () => {
    if (window.hoopPinAudio) {
      window.hoopPinAudio.unlock(true);
    }
    closeIntroScreen();
  });
}
</script>
